{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Take Attendance</h1>
        <p class="page-subtitle">Use face recognition to mark student attendance</p>
    </div>
</div>

<div class="attendance-layout">
    <!-- Camera Section -->
    <div class="glass-panel camera-section">
        <div class="camera-viewport">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
            
            <!-- Corner Markers -->
            <div class="camera-overlay">
                <div class="corner-marker top-left"></div>
                <div class="corner-marker top-right"></div>
                <div class="corner-marker bottom-left"></div>
                <div class="corner-marker bottom-right"></div>
            </div>

            <div id="scannerStatus" class="camera-badge">
                <i class="fas fa-circle text-success"></i>
                Camera Ready
            </div>
        </div>

        <div class="camera-controls">
            <button id="captureBtn" class="btn btn-primary btn-lg">
                <i class="fas fa-camera"></i> Scan Students
            </button>
            <button id="resetBtn" class="btn btn-ghost">
                <i class="fas fa-rotate-left"></i> Reset
            </button>
        </div>
    </div>

    <!-- Results Section -->
    <div class="results-section">
        <!-- Stats Card -->
        <div class="glass-panel stats-card">
            <h4 class="card-title">Session Stats</h4>
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Detected</span>
                    <span id="statDetected" class="stat-number">0</span>
                </div>
                <div class="stat-item stat-item-success">
                    <span class="stat-label">Recognized</span>
                    <span id="statAuth" class="stat-number">0</span>
                </div>
            </div>
        </div>

        <!-- Recognition Results -->
        <div class="glass-panel results-card">
            <h4 class="card-title">Recognition Results</h4>
            <div id="statusMessage" class="status-message">
                <i class="fas fa-info-circle"></i>
                Click "Scan Students" to begin
            </div>
            <div class="recognized-list">
                <ul id="attendanceList"></ul>
            </div>

            <!-- Mark Attendance Button (hidden until students are recognized) -->
            <div id="markAttendanceSection" style="display: none; margin-top: 1.5rem;">
                <button id="markAttendanceBtn" class="btn btn-primary btn-lg" style="width: 100%;">
                    <i class="fas fa-check-double"></i> Mark Attendance
                </button>
            </div>
            <div id="savedMessage" style="display: none; margin-top: 1rem;"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const resetBtn = document.getElementById('resetBtn');
    const markAttendanceBtn = document.getElementById('markAttendanceBtn');
    const markSection = document.getElementById('markAttendanceSection');
    const savedMessage = document.getElementById('savedMessage');
    const statusDiv = document.getElementById('statusMessage');
    const list = document.getElementById('attendanceList');

    const scanEndpoint = "{{ url_for('teacher.mark_attendance') }}";
    const saveEndpoint = "{{ url_for('teacher.save_attendance') }}";

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 1280, height: 720 } 
    })
    .then(stream => { video.srcObject = stream; })
    .catch(err => {
        statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle text-danger"></i> Camera access denied';
    });

    let authCount = 0;
    let recognizedRolls = [];  // Track all recognized roll numbers

    resetBtn.addEventListener('click', () => {
        list.innerHTML = '';
        authCount = 0;
        recognizedRolls = [];
        document.getElementById('statAuth').innerText = '0';
        document.getElementById('statDetected').innerText = '0';
        statusDiv.innerHTML = '<i class="fas fa-info-circle"></i> Click "Scan Students" to begin';
        markSection.style.display = 'none';
        savedMessage.style.display = 'none';
        savedMessage.innerHTML = '';
    });

    captureBtn.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        const dataURL = canvas.toDataURL('image/jpeg', 0.8);
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning faces...';
        captureBtn.disabled = true;

        const formData = new FormData();
        formData.append('image', dataURL);

        fetch(scanEndpoint, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                captureBtn.disabled = false;
                if (data.status === 'success') {
                    document.getElementById('statDetected').innerText = parseInt(document.getElementById('statDetected').innerText) + data.total_detected;

                    if (data.names.length === 0 && data.total_detected > 0) {
                        statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle text-warning"></i> ${data.total_detected} face(s) detected but none recognized. Try again.`;
                    } else if (data.names.length === 0) {
                        statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle text-warning"></i> No faces detected. Ensure students are visible.';
                    } else {
                        statusDiv.innerHTML = `<i class="fas fa-check-circle text-success"></i> ${data.subject} — ${data.names.length} student(s) recognized`;
                    }

                    data.names.forEach(roll => {
                        if (!recognizedRolls.includes(roll)) {
                            recognizedRolls.push(roll);
                            authCount++;
                            document.getElementById('statAuth').innerText = authCount;

                            const li = document.createElement('li');
                            li.className = "recognized-item animate-slide-down";
                            li.innerHTML = `<i class="fas fa-user-check text-success"></i> <strong>${roll}</strong>`;
                            list.prepend(li);
                        }
                    });

                    // Show Mark Attendance button if there are recognized students
                    if (recognizedRolls.length > 0) {
                        markSection.style.display = 'block';
                        savedMessage.style.display = 'none';
                    }
                } else {
                    statusDiv.innerHTML = `<i class="fas fa-times-circle text-danger"></i> ${data.message}`;
                }
            })
            .catch(err => {
                captureBtn.disabled = false;
                statusDiv.innerHTML = '<i class="fas fa-wifi text-danger"></i> Connection error. Please try again.';
            });
    });

    // Mark Attendance — POST recognized students to save
    markAttendanceBtn.addEventListener('click', () => {
        if (recognizedRolls.length === 0) return;

        markAttendanceBtn.disabled = true;
        markAttendanceBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        fetch(saveEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roll_numbers: recognizedRolls })
        })
        .then(res => res.json())
        .then(data => {
            markAttendanceBtn.disabled = false;
            if (data.status === 'success') {
                markAttendanceBtn.innerHTML = '<i class="fas fa-check"></i> Attendance Saved!';
                markAttendanceBtn.classList.remove('btn-primary');
                markAttendanceBtn.classList.add('btn-ghost');
                markAttendanceBtn.disabled = true;
                savedMessage.style.display = 'block';
                savedMessage.innerHTML = `<div class="status-message"><i class="fas fa-check-circle text-success"></i> ${data.message}</div>`;
            } else {
                markAttendanceBtn.innerHTML = '<i class="fas fa-check-double"></i> Mark Attendance';
                savedMessage.style.display = 'block';
                savedMessage.innerHTML = `<div class="status-message"><i class="fas fa-times-circle text-danger"></i> ${data.message}</div>`;
            }
        })
        .catch(err => {
            markAttendanceBtn.disabled = false;
            markAttendanceBtn.innerHTML = '<i class="fas fa-check-double"></i> Mark Attendance';
            savedMessage.style.display = 'block';
            savedMessage.innerHTML = '<div class="status-message"><i class="fas fa-wifi text-danger"></i> Connection error.</div>';
        });
    });
</script>
{% endblock %}
